name: Tailscale VPN (exit node)

on:
  workflow_dispatch:  # запуск вручную

jobs:
  run-exit-node:
    runs-on: ubuntu-latest
    steps:
      - name: Install and connect Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=gh-runner \
            --advertise-exit-node
          # Ждём 6 часов (максимальное время для публичного репозитория)
          sleep 21600
