name: Cloudflare Tunnel SOCKS5 Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2[reference:2][reference:3]

      - name: Start SSH server
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Create user for SSH
        run: |
          sudo useradd -m proxyuser
          echo "proxyuser:proxy123" | sudo chpasswd

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url ssh://localhost:22 &> cloudflared.log &
          sleep 5
          cat cloudflared.log

      - name: Keep alive
        run: sleep 6h
