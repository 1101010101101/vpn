name: Tailscale SOCKS Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Setup SSH server
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
          # Разрешаем парольную аутентификацию (временно, или используй ключи)
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Create temporary user for SSH
        run: |
          sudo useradd -m proxyuser
          echo "proxyuser:proxy123" | sudo chpasswd
          sudo usermod -aG sudo proxyuser

      - name: Connect Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TS_AUTHKEY }} \
            --hostname=gh-proxy
          sleep 5
          # Выводим Tailscale IP раннера
          echo "Proxy IP: $(tailscale ip -4)"
          echo "SSH command: ssh -D 1080 proxyuser@$(tailscale ip -4)"

      - name: Keep alive
        run: sleep 6h
